# Developer Activity Simulator — Default Configuration
# Purpose: QA testing and validation of monitoring system behavior

# Total execution duration in minutes
duration_minutes: 60

# Activity toggles
mouse_enabled: true
keyboard_enabled: true
vscode_enabled: true

# Probability of idle period between actions (0.0 to 1.0)
idle_probability: 0.25

# Typing speed in words per minute
typing_speed_wpm: 50

# Mouse movement frequency in seconds (average interval between moves)
mouse_move_interval: 3.0

# Random seed for deterministic runs (null for random)
random_seed: 12345

# Test scenario: continuous | intermittent | edge_timeout | long_duration | randomized
scenario: randomized

# Logging verbosity: DEBUG | INFO | WARNING | ERROR
logging_verbosity: INFO

# Report output formats
report_formats:
  - json
  - csv
  - html

# Report output directory
report_dir: ./reports

# Log output directory
log_dir: ./logs

# Target applications for window management
target_applications:
  - "Visual Studio Code"
  - "Windows Terminal"
  - "Google Chrome"

# VS Code specific settings
vscode:
  workspace_path: ./test_workspace
  auto_save_interval: 30  # seconds between auto-saves

# Edge timeout scenario settings
edge_timeout:
  timeout_threshold_seconds: 300  # 5 minutes
  activity_delta_seconds: 10     # act this many seconds before timeout

# Intermittent scenario settings
intermittent:
  burst_duration_min: 120    # seconds
  burst_duration_max: 300    # seconds
  idle_duration_min: 60      # seconds
  idle_duration_max: 180     # seconds

# AI-driven scenario settings (v2.0)
# Requires an OpenRouter API key. The AI model decides actions via tool calling.
# ai:
#   api_key: null                          # Or set OPENROUTER_API_KEY env var
#   model: "google/gemini-2.0-flash"       # Any OpenRouter model ID
#   base_url: "https://openrouter.ai/api/v1"
#   system_prompt: null                    # Custom AI persona (null = default)
#   temperature: 0.9                       # Higher = more random/human-like
#   context_window: 10                     # Past actions included as context
#   max_api_calls: 500                     # Safety cap per session
#   thinking_delay_min: 1.0                # Min seconds between AI decisions
#   thinking_delay_max: 5.0                # Max seconds between AI decisions

# Safety settings (v2.1)
safety:
  window_guard_enabled: true       # Only act when a target app is in focus
  refocus_on_mismatch: true        # Try to bring a target app to foreground
  window_guard_timeout: 30.0       # Max seconds to wait for target window
  presence_detection_enabled: true # Pause when real user is active
  resume_delay_seconds: 5.0        # Seconds to wait after user stops
  sandbox_enabled: true            # Use isolated workspace for file ops
  sandbox_dir: "./.jiggler_sandbox"
  clean_on_exit: false             # Delete sandbox files after run
  log_blocked_actions: true
  blocked_actions:
    # Explicitly block potentially destructive actions just in case
    - "keyboard__press_hotkey_paste"

